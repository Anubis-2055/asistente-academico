<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Asistente Virtual Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
        }
        .navbar {
            background: linear-gradient(135deg, #1a3a6b, #2196F3);
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .btn-chatbot {
            background: linear-gradient(135deg, #1a3a6b, #2196F3);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            width: 100%;
        }
        .aviso-item {
            border-left: 4px solid #2196F3;
            padding: 10px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">Asistente Virtual Académico</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nombreUsuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-4">
    <h5 class="mb-4" id="saludo"></h5>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">📅</div>
                <h6 class="fw-bold">Mis horarios</h6>
                <p class="text-muted small">Ver clases del día</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">📝</div>
                <h6 class="fw-bold">Mis tareas</h6>
                <p class="text-muted small" id="resumenTareas">Ver tareas pendientes</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">⭐</div>
                <h6 class="fw-bold">Calificaciones</h6>
                <p class="text-muted small" id="resumenPromedio">Ver mis notas</p>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">📌 Tareas pendientes</h6>
        <div id="tareasPendientes">
            <p class="text-muted">Cargando tareas...</p>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold mb-0">🔔 Avisos recientes</h6>
            <button class="btn btn-sm btn-outline-primary" onclick="marcarAvisosLeidos()">Marcar todos como leídos</button>
        </div>
        <div id="avisos">
            <p class="text-muted">Cargando avisos...</p>
        </div>
    </div>

    <button class="btn-chatbot" onclick="window.location.href='chatbot.html'">
        🤖 Abrir Asistente Virtual
    </button>
</div>

<script>
    const nombre = localStorage.getItem('nombre');
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'index.html';
    }

    document.getElementById('nombreUsuario').textContent = nombre;

    const hora = new Date().getHours();
    let saludo = hora < 12 ? 'Buenos días' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('saludo').textContent = `${saludo}, ${nombre}! 👋`;

    async function cargarDashboard() {
        try {
            const respuesta = await fetch('/api/dashboard', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (respuesta.status === 401 || respuesta.status === 403) {
                localStorage.clear();
                window.location.href = 'index.html';
                return;
            }

            if (!respuesta.ok) {
                throw new Error('No se pudo cargar el dashboard');
            }

            const datos = await respuesta.json();
            const resumen = datos.resumen;
            const tareas = datos.tareasPendientes;

            document.getElementById('resumenTareas').textContent =
                `${resumen.tareasPendientes} tarea(s) pendiente(s)`;

            document.getElementById('resumenPromedio').textContent =
                resumen.promedioGeneral != null
                    ? `Promedio general: ${resumen.promedioGeneral}`
                    : 'Aún sin calificaciones';

            if (tareas.length === 0) {
                document.getElementById('tareasPendientes').innerHTML =
                    '<p class="text-muted">No tienes tareas pendientes. 🎉</p>';
            } else {
                document.getElementById('tareasPendientes').innerHTML = tareas.map(t => `
                    <div class="aviso-item">
                        <strong>${t.titulo}</strong> — ${t.materia}<br>
                        <span class="text-muted small">Entrega: ${t.fechaEntrega} (en ${t.diasRestantes} día(s))</span>
                    </div>
                `).join('');
            }

            document.getElementById('avisos').innerHTML = resumen.avisosNoLeidos > 0
                ? `<div class="aviso-item">Tienes <strong>${resumen.avisosNoLeidos}</strong> aviso(s) sin leer.</div>`
                : '<p class="text-muted">No hay avisos pendientes por el momento.</p>';

        } catch (error) {
            document.getElementById('tareasPendientes').innerHTML =
                '<p class="text-danger">No se pudo cargar la información del dashboard.</p>';
            document.getElementById('avisos').innerHTML =
                '<p class="text-danger">No se pudo cargar la información del dashboard.</p>';
        }
    }

    cargarDashboard();

    async function marcarAvisosLeidos() {
        try {
            const respuesta = await fetch('/api/dashboard/avisos/marcar-leidos', {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (!respuesta.ok) {
                throw new Error('No se pudo actualizar los avisos');
            }

            await cargarDashboard();
        } catch (error) {
            alert('No se pudieron marcar los avisos como leídos.');
        }
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
