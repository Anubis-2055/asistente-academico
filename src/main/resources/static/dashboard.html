<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Asistente Virtual Académico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
        }
        .navbar {
            background: linear-gradient(135deg, #1a3a6b, #2196F3);
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .btn-chatbot {
            background: linear-gradient(135deg, #1a3a6b, #2196F3);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 10px;
            width: 100%;
        }
        .aviso-item {
            border-left: 4px solid #2196F3;
            padding: 10px 15px;
            margin-bottom: 10px;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold">Asistente Virtual Académico</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nombreUsuario"></span>
        <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</nav>

<div class="container mt-4">
    <h5 class="mb-4" id="saludo"></h5>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">📅</div>
                <h6 class="fw-bold">Mis horarios</h6>
                <p class="text-muted small">Ver clases del día</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">📝</div>
                <h6 class="fw-bold">Mis tareas</h6>
                <p class="text-muted small">Ver tareas pendientes</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-4 text-center" onclick="window.location.href='chatbot.html'">
                <div class="card-icon">⭐</div>
                <h6 class="fw-bold">Calificaciones</h6>
                <p class="text-muted small">Ver mis notas</p>
            </div>
        </div>
    </div>

    <div class="card p-4 mb-4">
        <h6 class="fw-bold mb-3">🔔 Avisos recientes</h6>
        <div id="avisos">
            <p class="text-muted">Cargando avisos...</p>
        </div>
    </div>

    <button class="btn-chatbot" onclick="window.location.href='chatbot.html'">
        🤖 Abrir Asistente Virtual
    </button>
</div>

<script>
    const nombre = localStorage.getItem('nombre');
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'index.html';
    }

    document.getElementById('nombreUsuario').textContent = nombre;

    const hora = new Date().getHours();
    let saludo = hora < 12 ? 'Buenos días' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
    document.getElementById('saludo').textContent = `${saludo}, ${nombre}! 👋`;

    document.getElementById('avisos').innerHTML = `
            <div class="aviso-item">No hay avisos pendientes por el momento.</div>
        `;

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
