<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual Académico - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3a6b, #2196F3);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: #2196F3;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .btn-primary {
            background: #2196F3;
            border: none;
            padding: 12px;
            font-size: 16px;
        }
        .btn-primary:hover {
            background: #1a3a6b;
        }
        #mensaje {
            display: none;
        }
    </style>
</head>
<body>
<div class="card p-4">
    <div class="text-center mb-4">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="white" viewBox="0 0 16 16">
                <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm3.5 7.5a.5.5 0 0 1 0 1H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5z"/>
            </svg>
        </div>
        <h4 class="fw-bold">Asistente Virtual Académico</h4>
        <p class="text-muted">UTEQ — Ingeniería de Software</p>
    </div>
    <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="email" placeholder="usuario@uteq.edu.ec">
    </div>
    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="contrasena" placeholder="••••••••">
    </div>
    <div id="mensaje" class="alert" role="alert"></div>
    <button class="btn btn-primary w-100 mb-3" onclick="login()">Iniciar sesión</button>
    <p class="text-center text-muted">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
</div>

<script>
    async function login() {
        const email = document.getElementById('email').value;
        const contrasena = document.getElementById('contrasena').value;
        const mensaje = document.getElementById('mensaje');

        try {
            const response = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, contrasena })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('rol', data.rol);
                window.location.href = 'dashboard.html';
            } else {
                mensaje.style.display = 'block';
                mensaje.className = 'alert alert-danger';
                mensaje.textContent = data;
            }
        } catch (error) {
            mensaje.style.display = 'block';
            mensaje.className = 'alert alert-danger';
            mensaje.textContent = 'Error de conexión con el servidor';
        }
    }
</script>
</body>
</html>
