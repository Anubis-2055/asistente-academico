# Base de datos PostgreSQL (desarrollo local)
spring.datasource.url=jdbc:postgresql://localhost:5432/asistente_academico
spring.datasource.username=postgres
spring.datasource.password=BANKAI
spring.jpa.show-sql=true
server.port=8080

# Migraciones versionadas via Flyway. El esquema NUNCA se crea via
# ddl-auto=update; ddl-auto=validate solo verifica que las entidades JPA
# coincidan con el esquema ya aplicado por Flyway (local) o por
# db/schema.sql (contenedor Docker, ver docker-compose.yml).
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

spring.data.redis.host=localhost
spring.data.redis.port=6379 